<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git-Desktop-GUI</title>
  <style>
    body { margin:0; background:#f5f6fa; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif; }
    #loader { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px; }
    .spinner { width:40px; height:40px; border:3px solid #e2e8f0; border-top-color:#2563eb; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loader-text { color:#64748b; font-size:14px; }
    .loader-logo { font-size:40px; color:#2563eb; font-weight:700; }
    html.dark #loader { background:#1a1b26; }
    html.dark .loader-text { color:#8b8fa3; }
  </style>
  <script>
    try {
      if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    } catch(e) {}
  </script>
</head>
<body>
  <div id="app">
    <div id="loader">
      <div class="loader-logo">&#x2B9E;</div>
      <div class="spinner"></div>
      <div class="loader-text">Git-Desktop-GUI 正在启动...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
